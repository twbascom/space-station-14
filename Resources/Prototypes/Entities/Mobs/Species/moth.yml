- type: entity
  parent: BaseMobSpeciesOrganic
  id: BaseMobMoth
  name: Urist McMoth
  abstract: true
  components:
  - type: Hunger
  - type: Icon
    sprite: Mobs/Species/Moth/parts.rsi
    state: full
  - type: Thirst
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeat
      amount: 5
  - type: HumanoidAppearance
    species: Moth
  - type: Inventory
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Moth/displacement.rsi
            state: jumpsuit-female
  - type: Vocal
    sounds:
      Male: UnisexMoth
      Female: UnisexMoth
      Unsexed: UnisexMoth
  - type: Speech
    speechSounds: Moth
  - type: JumpAbility
    action: ActionMothGravityJump
    canCollide: true
    jumpDistance: 3
    jumpSound:
      path: /Audio/Weapons/punchmiss.ogg
      params:
        pitch: 1.33
        volume: -5
        variation: 0.05
  - type: MovementSpeedModifier
    weightlessModifier: 1.5

- type: entity
  parent: BaseSpeciesDummy
  id: AppearanceMoth
  categories: [ HideSpawnMenu ]
  components:
  - type: Inventory
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Moth/displacement.rsi
            state: jumpsuit-female
