  components:
  - type: Hunger
  - type: Thirst
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeat
      amount: 5
  - type: Icon
    sprite: Mobs/Customization/TajaranCustomization/head.rsi
    state: muzzle
  - type: HumanoidAppearance
    species: Tajaran
    hideLayersOnEquip:
    - Hair
    - FacialHair
    - Snout
    - SnoutCover
    - HeadTop
    - HeadSide
    - Tail
  - type: Inventory
    speciesId: tajaran
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Human/displacement.rsi
            state: jumpsuit-female
  - type: Speech
    speechSounds: Alto
  - type: Vocal
    sounds:
      Male: MaleHuman
      Female: FemaleHuman
      Unsexed: MaleHuman

