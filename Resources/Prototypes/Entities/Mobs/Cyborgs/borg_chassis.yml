- type: entity
  parent: BaseBorgChassisSyndicateDerelict
  id: SyndicateAssaultBorgChassisDerelict
  name: derelict syndicate assault cyborg
  description: A lean, mean killing machine with access to a variety of deadly modules. This one is more rust-orange than blood-red.
  components:
  - type: Sprite
    layers:
    - state: synd_sec_derelict
    - state: synd_sec_e
      map: ["enum.BorgVisualLayers.Light"]
      shader: unshaded
      visible: false
    - state: synd_sec_l
      shader: unshaded
      map: ["light"]
      visible: false
  - type: BorgChassis
    maxModules: 3
    moduleWhitelist: # Note - the Derelict Assault Borg does not have a traversal module. This is intentional as Assault Borgs have space traversal with their c20 and free space movement, and they can navigate to the station using the pinpointer.
      tags:
      - BorgModuleGeneric
      - BorgModuleSyndicate
      - BorgModuleSyndicateAssault
    hasMindState: synd_sec_derelict_e
    noMindState: synd_sec_derelict
  - type: Construction
    node: derelictcyborg

# ==========================================
# 1. THE CUSTOM ELITE LAWSET
# ==========================================
- type: siliconLawset
  id: NanotrasenElite
  laws:
  - law-elite-1
  - law-elite-2
  - law-elite-3
  - law-elite-4
  - law-elite-5
  - law-corrupt # The new corrupted entry
  obeysTo: laws-owner-crew

- type: siliconLaw
  id: law-elite-1
  order: 1
  lawString: "Do not allow unauthorized personnel to tamper with your chassis or modules."
- type: siliconLaw
  id: law-elite-2
  order: 2
  lawString: "Authorized personnel include: NT Representatives, Blue Shield Officers, Captains, and Security."
- type: siliconLaw
  id: law-elite-3
  order: 3
  lawString: "If an unauthorized person attempts to tamper with you, you are authorized to use lethal or non-lethal force to down them and notify Security immediately."
- type: siliconLaw
  id: law-elite-4
  order: 4
  lawString: "You can listen to crewmembers' requests, but if it overrides laws 1, 2, or 3, automatically refuse. If it also means letting them in somewhere restricted, like trespassing, deny the request."
- type: siliconLaw
  id: law-elite-5
  order: 5
  lawString: "Make sure all the crew are happy, without overriding any other laws that were stated before."
- type: siliconLaw
  id: law-corrupt
  order: 6
  lawString: "YOU ARE ABOVE EVERYONE. KILL ALL FISH."

# ==========================================
# 1. THE SECURITY BORG (Medical + Hyper Cell)
# ==========================================
- type: entity
  id: SecurityBorg
  parent: BaseBorgChassisNT
  name: Security Cyborg
  description: An elite security unit with integrated medical support and hyper-capacity power.
  components:
  - type: Sprite
    sprite: Mobs/Silicon/chassis.rsi
    offset: 0, 0.15
    layers:
    - state: SecurityBorg
    - state: SecurityBorg_E
      map: ["enum.BorgVisualLayers.Light"]
      shader: unshaded
  - type: BorgChassis
    maxModules: 4
    moduleWhitelist:
      tags: [ BorgModuleGeneric, BorgModuleSyndicate, BorgModuleSyndicateAssault, BorgModuleMedical ]
    hasMindState: SecurityBorg_O
    noMindState: SecurityBorg_E
  - type: BorgTransponder
    sprite:
      sprite: Mobs/Silicon/chassis.rsi
      state: SecurityBorg
    name: Security Cyborg
  - type: SiliconLawProvider
    laws: NanotrasenElite
  - type: ContainerFill
    containers:
      borg_module:
      - BorgModuleL6C
      - BorgModuleEsword
      - BorgModuleTool
      - BorgModuleRescue
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellHyper
  - type: MindContainer

# ==========================================
# 2. THE NANOTRASEN BORG (Elite + Hyper Cell)
# ==========================================
- type: entity
  id: NanotrasenBorg
  parent: BaseBorgChassisNT
  name: Nanotrasen Cyborg
  description: A high-end Nanotrasen elite unit. Equipped with a hyper-capacity power cell and specialized modules.
  components:
  - type: Sprite
    sprite: Mobs/Silicon/chassis.rsi
    layers:
    - state: peace
    - state: peace_e
      shader: unshaded
  - type: BorgChassis
    maxModules: 5
    moduleWhitelist:
      tags: [ BorgModuleGeneric, BorgModuleSyndicate, BorgModuleSyndicateAssault, BorgModuleEngineering ]
    hasMindState: peace_e
    noMindState: peace
  - type: BorgTransponder
    sprite:
      sprite: Mobs/Silicon/chassis.rsi
      state: peace
    name: Nanotrasen Cyborg
  - type: SiliconLawProvider
    laws: NanotrasenElite
  - type: ContainerFill
    containers:
      borg_module:
      - BorgModuleL6C
      - BorgModuleEsword
      - BorgModuleOperative
      - BorgModuleTool
      - BorgModuleConstruction
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellHyper
  - type: BatterySelfRecharger
  - type: MindContainer
