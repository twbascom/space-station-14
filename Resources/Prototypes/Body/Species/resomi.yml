  id: MobResomi
  name: Urist McResomi
  components:
  - type: Speech
    speechSounds: Tenor # High pitched
    speechVerb: Resomi
    allowedEmotes: [ 'Chirp', 'Click', 'Whistle' ]
  - type: Vocal
    sounds:
      Male: MaleResomi
      Female: FemaleResomi
      Unsexed: MaleResomi
  - type: Damageable
    damageModifierSet: Resomi
  - type: Butcherable
    spawned:
    - id: FoodMeatHuman # They are still meat
      amount: 3 # Smaller meat amount
